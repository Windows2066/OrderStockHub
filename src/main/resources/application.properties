# ============================================================
# Docker 环境下 MySQL / Redis / Nacos 配置
# ============================================================

# 应用名称（用于 Nacos 服务注册与配置管理）
spring.application.name=project1

# -----------------------------
# MySQL 配置
# -----------------------------
# 数据库连接地址，库名：mall_order
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/mall_order?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
# 数据库用户名
spring.datasource.username=root
# 数据库密码（请按本地环境修改）
spring.datasource.password=root123
# MySQL 8 驱动
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -----------------------------
# Redis 配置
# -----------------------------
# Redis 主机地址
spring.data.redis.host=127.0.0.1
# Redis 端口
spring.data.redis.port=6379
# Redis 连接超时时间
spring.data.redis.timeout=3s

# -----------------------------
# Nacos 配置
# -----------------------------
# Nacos 服务地址（本地 Docker 默认 127.0.0.1:8848）
spring.cloud.nacos.server-addr=127.0.0.1:8848
# 服务注册中心地址
spring.cloud.nacos.discovery.server-addr=${spring.cloud.nacos.server-addr}
# 配置中心地址
spring.cloud.nacos.config.server-addr=${spring.cloud.nacos.server-addr}
# 命名空间，留空表示 public
spring.cloud.nacos.config.namespace=
# 分组，默认 DEFAULT_GROUP
spring.cloud.nacos.config.group=DEFAULT_GROUP
# 从 Nacos 导入配置；本地无配置时不阻塞启动
spring.config.import=optional:nacos:${spring.application.name}.properties

# -----------------------------
# MyBatis 配置
# -----------------------------
# 开启下划线转驼峰映射（如 created_at -> createdAt）
mybatis.configuration.map-underscore-to-camel-case=true

# -----------------------------
# SQL 初始化配置
# -----------------------------
# 启动时执行 schema.sql
spring.sql.init.mode=always
# schema 文件位置
spring.sql.init.schema-locations=classpath:db/schema.sql

# -----------------------------
# 兼容性配置
# -----------------------------
# 临时关闭兼容性校验：当前 Spring Boot 3.5.11 与 Spring Cloud 发行列存在版本差异
# 后续建议统一到官方兼容矩阵版本，再移除此配置。
spring.cloud.compatibility-verifier.enabled=false
