# ============================================================
# 应用基础配置
# ============================================================
spring.application.name=project1

# ============================================================
# MySQL 配置
# ============================================================
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/mall_order?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# Redis 配置（Spring Data Redis + Redisson 共用）
# ============================================================
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.timeout=3s

# Redis 分布式锁参数（下单幂等与并发控制）
app.redis.lock.order-create.prefix=lock:order:create:
app.redis.lock.order-create.wait-seconds=2
app.redis.lock.order-create.lease-seconds=10

# ============================================================
# Nacos 配置
# ============================================================
spring.cloud.nacos.server-addr=127.0.0.1:8848
spring.cloud.nacos.discovery.server-addr=${spring.cloud.nacos.server-addr}
spring.cloud.nacos.config.server-addr=${spring.cloud.nacos.server-addr}
spring.cloud.nacos.config.namespace=
spring.cloud.nacos.config.group=DEFAULT_GROUP
spring.config.import=optional:nacos:${spring.application.name}.properties

# ============================================================
# MyBatis 配置
# ============================================================
mybatis.configuration.map-underscore-to-camel-case=true

# ============================================================
# Flyway 配置（由 Flyway 管理数据库结构演进）
# ============================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.encoding=UTF-8

# 关闭 Spring SQL 自动初始化，避免与 Flyway 重复执行
spring.sql.init.mode=never

# ============================================================
# Spring Security + JWT 配置
# ============================================================
app.security.jwt.secret=0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789
app.security.jwt.expire-seconds=7200
app.security.login.username=admin
app.security.login.password=admin123

# ============================================================
# RocketMQ + Outbox 配置
# ============================================================
rocketmq.name-server=127.0.0.1:9876
rocketmq.producer.group=order-service-producer
# 发送超时和重试参数：本地环境建议适当放宽
rocketmq.producer.send-message-timeout=10000
rocketmq.producer.retry-times-when-send-failed=2
app.rocketmq.enabled=true
app.rocketmq.order-topic=order-created-topic
app.rocketmq.order-tags=created
app.rocketmq.consumer-group=order-created-consumer
app.outbox.relay-enabled=true
# 提升 Outbox 清理吞吐：每轮处理更多事件并缩短调度间隔
app.outbox.relay-batch-size=200
app.outbox.relay-fixed-delay-ms=500

# ============================================================
# 兼容性配置
# ============================================================
spring.cloud.compatibility-verifier.enabled=false
