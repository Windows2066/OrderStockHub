# 测试环境配置：使用本地 MySQL/Redis，关闭 Nacos，Outbox 发布改为本地模拟
spring.application.name=project1

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/mall_order?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.timeout=3s

app.redis.lock.order-create.prefix=lock:order:create:
app.redis.lock.order-create.wait-seconds=2
app.redis.lock.order-create.lease-seconds=10

mybatis.configuration.map-underscore-to-camel-case=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.sql.init.mode=never

spring.cloud.nacos.discovery.enabled=false
spring.cloud.nacos.config.enabled=false
spring.cloud.compatibility-verifier.enabled=false

app.security.jwt.secret=0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789
app.security.jwt.expire-seconds=7200
app.security.login.username=admin
app.security.login.password=admin123

app.rocketmq.enabled=false
app.outbox.relay-enabled=false
app.outbox.relay-fixed-delay-ms=600000
