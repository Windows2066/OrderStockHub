# RocketMQ Broker 基础配置
# 关键点：brokerIP1 必须是应用可访问地址，避免客户端拿到容器内网 IP 后发送超时
brokerClusterName=DefaultCluster
brokerName=broker-a
brokerId=0
deleteWhen=04
fileReservedTime=48
brokerRole=ASYNC_MASTER
flushDiskType=ASYNC_FLUSH

# 让运行在宿主机上的 Spring Boot 直接通过本机端口访问 Broker
brokerIP1=127.0.0.1

# 本地开发便于自动创建 Topic
autoCreateTopicEnable=true

# 指向 NameServer，确保 Broker 能注册成功
namesrvAddr=rocketmq-namesrv:9876

# Broker remoting 监听端口
listenPort=10911
